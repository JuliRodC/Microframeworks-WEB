<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebFramework</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            background-color: #f5f5f5;
        }
        h1 { color: #333; }
        .endpoint {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
        }
        a { color: #4CAF50; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<h1> WebFramework Running!</h1>
<p>Available REST endpoints:</p>

<div class="endpoint">
    <strong>GET /hello</strong><br>
    <a href="/hello?name=Pedro" target="_blank">http://localhost:8080/hello?name=Pedro</a>
</div>

<div class="endpoint">
    <strong>GET /pi</strong><br>
    <a href="/pi" target="_blank">http://localhost:8080/pi</a>
</div>
</body>
</html>
